---

# == Notes ==

# GitLab automatically passes artifacts from previous stages by default

# This CI definition uses a GitLab provided include template

# Secret variables
# - Set required secret variables at: https://gitlab.data.bas.ac.uk/magic/add-metadata-toolbox/settings/ci_cd
# - Variables are grouped by section in KEY: "value" format (e.g. FOO: "bar")
# - Sensitive values are represented by "[Sensitive]"
#
# - PyPi (production) - create tokens at https://pypi.org/manage/account/
# > PYPI_TOKEN (protected): "[Sensitive]"

# == Includes ==

include:
  - template: 'Workflows/MergeRequest-Pipelines.gitlab-ci.yml'

# == Global settings ==

stages:
  - 🧪 test
  - 📋 lint
  - 🏗 build
  - 🚚 publish

variables:
  APP_NAME: scar-add-metadata-toolbox

image:
  name: docker-registry.data.bas.ac.uk/magic/add-metadata-toolbox:latest
  entrypoint: [""]

# == Jobs ==

test:
  stage: 🧪 test
  needs: []
  variables:
    FLASK_ENV: testing
  script:
    - "poetry run pytest -o junit_family=xunit2 --junitxml=test-results.xml --random-order --cov=scar_add_metadata_toolbox --cov-fail-under=100"
    - "poetry run coverage html"
  coverage: '/Total coverage: \d+\.\d+/'
  artifacts:
    reports:
      junit: test-results.xml
    paths:
      - htmlcov
    expire_in: 1 month
  rules:
    - changes:
        - '**/*.py'

black:
  stage: 📋 lint
  needs: []
  script:
    - "poetry run black --check scar_add_metadata_toolbox/ tests/"
  rules:
    - changes:
      - '**/*.py'

bandit:
  stage: 📋 lint
  needs: []
  script:
    - "bandit -r ."
  rules:
    - changes:
      - '**/*.py'

build:
  stage: 🏗 build
  needs: []
  script:
    - "poetry version 0.0.0"
    - "poetry build"
  artifacts:
    paths:
      - dist
    expire_in: 1 week
  rules:
    -
      if: '$CI_COMMIT_TAG == null'
      changes:
        - '**/*.py'

publish:
  stage: 🚚 publish
  needs:
    - test
  before_script:
    - "poetry config pypi-token.pypi $PYPI_TOKEN --local"
  script:
    - "poetry publish --build --no-interaction"
  rules:
    - if: '$CI_COMMIT_TAG != null'
