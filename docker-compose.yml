---
version: "2"

services:
  db:
    image: postgis/postgis:12-3.0-alpine
    environment:
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  web:
    image: nginx:alpine
    volumes:
      - ./support/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./_site/:/usr/share/nginx/html/public/
    ports:
      - "9001:9001"
