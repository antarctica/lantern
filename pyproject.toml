[tool.poetry]
name = "scar-add-metadata-toolbox"
version = "0.6.0"
license = "MIT"
description = "Editor, repository and data catalogue for SCAR Antarctic Digital Database (ADD) discovery metadata"
authors = [
    "Felix Fennell <felnne@bas.ac.uk>"
]
readme = "README.md"
homepage = "https://github.com/antarctica/scar-add-metadata-toolbox"
repository = "https://github.com/antarctica/scar-add-metadata-toolbox"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research"
]

[tool.poetry.dependencies]
awscli = "1.31.8" # pinned to aid in dependency resolution time
bas-metadata-library = "^0.9.1"
bas-style-kit-jinja-templates = "^0.7.0"
click-spinner = "^0.1.10"
dulwich = "^0.20.50"
Flask = "^2.0.2"
flask-azure-oauth = "^0.7.0"
Markdown = "^3.4.1"
msal = "^1.19.0"
python = "^3.9"
python-dateutil = "^2.8.1"
python-dotenv = "^1.0.0"
requests = "^2.28.1"
sentry-sdk = {version = "^1.9.9", extras = ["flask"]}
str2bool = "^1.1"
tabulate = "^0.9.0"

# # Backports # #
importlib_resources = "^5.10.0"

# # Dependencies for vendored OWSlib package # #
pytz = "^2023.3"
pyproj = "3.6.1"  # pinned to ensure compatibility with PROJ version available in Python alpine container
pyyaml = "^6.0"   # pinned for AWS CLI compatibility, which requires PyYAML < 6.1
# Note: `python-dateutil and `requests` dependencies skipped as they already dependencies of the main app.

# # Dependencies for vendored PyCSW package # #
geolinks = "^0.2.0"
Shapely = "^1.8.4"
xmltodict = "^0.13.0"
psycopg2-binary = "^2.9.3"
SQLAlchemy = "^1.4.41"
# Note: `lxml` and `pyproj` dependencies skipped as they already dependencies of main app and owslib dependency.

[tool.poetry.group.dev.dependencies]
flake8 = "^6.1.0"
flake8-bandit = "^4.1.1"
flake8-black = "^0.3.5"
flake8-bugbear = "^23.12.2"
flake8-builtins = "^2.0.1"
flake8-comprehensions = "^3.10.1"
flake8-import-order = "^0.18.1"
flake8-pyproject = "^1.2.1"
flake8-use-fstring = "^1.4"
pep8-naming = "^0.13.2"
pytest = "^7.2.0"
pytest-cov = "^4.0.0"
pytest-flask = "^1.2.0"
pytest-random-order = "^1.0.4"
safety = "^2.3.2"

[tool.black]
line-length = 120
target-version = ['py36']
include = '\.pyi?$'
exclude = ''

[tool.coverage.run]
branch = false
source = ["src"]
omit = ["*/hazmat/*"]

[tool.coverage.report]
show_missing = false
fail_under = 100

[tool.coverage.html]
directory = "htmlcov"

[tool.flake8]
# ignore code in hazmat module
extend-exclude = ['*/hazmat/*']

# A:   builtins (variables named after builtin names)
# B:   bug-bear (additional bad code checks)
# B9:  bug-bear opinionated (additional, additional bad code checks)
# BLK: black (code formatting)
# C:   mccabe (code complexity)
# C4:  comprehensions (list/dict/set comprehensions)
# E:   pycodestyle errors (PEP8 checks)
# F:   pyflakes (invalid/bad code checks)
# FS:  use-fstring (f-strings used for text interpolation)
# I:   import order (python import ordering)
# N:   Pep8 naming
# S:   bandit (static security checks)
# W:   pycodestyle warnings (PEP8 checks)
select = ['A','B','B9','BLK','C','C4','E','F','FS','N','I','S','W']

# E203: for Black compatibility (whitespace before ‘:')
# E501: for bug-bear compatibility (as B905 overrides line length checks)
# S320: for using fromstring to process XML (see 'lxml package (bandit)' section in README for details)
# S410: for using Element to process XML (see 'lxml package (bandit)' section in README for details)
# W503: for Black compatibility (line break before binary operator)
ignore = ['E203','E501','S320','S410','W503']

# tests/*: S101 - ignore use of assert
# config.py: N802 - ignore use of upper case method names
per-file-ignores = ['tests/*: S101', 'config.py: N802']

# general
max-line-length = 120

# for mccabe
max-complexity = 10

# for flake8-import-order
application-import-names = ['scar_add_metadata_toolbox', 'tests.scar_add_metadata_toolbox_tests']
import-order-style = 'smarkets'


[build-system]
requires = ["poetry>=1.0.0"]
build-backend = "poetry.masonry.api"
