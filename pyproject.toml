[tool.poetry]
name = "scar-add-metadata-toolbox"
version = "0.7.3"
description = "Editor, repository and data catalogue for SCAR Antarctic Digital Database (ADD) discovery metadata"
authors = [
  "Felix Fennell <felnne@bas.ac.uk>",
  "Paul Breen <pbree@bas.ac.uk>",
  "Guy Phlips <guyill@bas.ac.uk>",
]
readme = "README.md"
license = "MIT"
packages = [{ include = "scar_add_metadata_toolbox", from = "src" }]

[tool.poetry.dependencies]
awscli = "1.33.35"  # pinned to aid in dependency resolution time
bas-metadata-library = "^0.11.0"
bas-style-kit-jinja-templates = "^0.7.0"
click-spinner = "^0.1.10"
dulwich = "^0.22.1"
Flask = "^2.3.3"
flask-entra-auth = "^0.9.0"
Markdown = "^3.4.1"
msal = "^1.19.0"
msal-extensions = "^1.2.0"
platformdirs = "^4.2.2"
python = "^3.9"
python-dateutil = "^2.8.1"
python-dotenv = "^1.0.0"
requests = "^2.28.1"
sentry-sdk = {version = "^2.13.0", extras = ["flask"]}
str2bool = "^1.1"
tabulate = "^0.9.0"

# # Backports
#
importlib_resources = "^6.4.4"

# # Dependencies for vendored OWSlib package
#
pyproj = "3.6.1"  # pinned to ensure compatibility with PROJ version available in Python alpine container
# python-dateutil  # skipped as already dependencies of main app
pytz = "^2024.1"
pyyaml = "^6.0"   # pinned for AWS CLI compatibility, which requires PyYAML < 6.1
# requests  # skipped as already dependencies of main app

# # Dependencies for vendored PyCSW package
#
geolinks = "^0.2.0"
# lxml  # skipped as already dependencies of main app and owslib dependency
psycopg2-binary = "^2.9.3"
# pyproj  # skipped as already dependencies of main app and owslib dependency
Shapely = "^1.8.4"
SQLAlchemy = "^1.4.53"
xmltodict = "^0.13.0"

[tool.poetry.group.dev.dependencies]
ruff = "^0.5.6"
safety = "^3.2.4"

[tool.poetry.group.test.dependencies]
pytest = "^8.3.2"
pytest-cov = "^5.0.0"
pytest-env = "^1.1.3"
pytest-httpserver = "^1.1.0"
pytest-mock = "^3.14.0"
pytest-random-order = "^1.1.1"

[tool.ruff]
src = ["src"]
line-length = 120
target-version = "py39"
exclude = ["*/hazmat/*"]

[tool.ruff.lint]
select = ['A', 'ANN', 'B', 'B9', 'C90', 'C4', 'D', 'DTZ', 'E', 'EM', 'ERA', 'F', 'FA', 'I', 'N', 'PT', 'PTH', 'RET', 'RUF', 'S', 'SIM', 'TD', 'TRY', 'UP', 'W']
#   A | builtins (variables named after builtin names)
# ANN | annotations (type hints)
#   B | bug-bear (bad code)
#  B9 | bug-bear opinionated (additional bad code)
# C90 | mccabe (code complexity)
#  C4 | comprehensions (list/dict/set comprehensions)
#   D | pydocstyle (docstring)
# DTZ | datetimez (date/time)
#   E | pycodestyle errors (PEP8)
#  EM | errmsg (exceptions)
# ERA | eraticate (comments)
#   F | pyflakes (invalid/bad code)
#  FA | uture-annotations (type hints)
#   I | isort (import ordering)
#   N | pep8-naming (PEP8)
#  PT | pytest-style (tests)
# PTH | use-pathlib (old syntax)
# RET | return (return statements)
# RUF | ruff (other)
#   S | bandit (static security)
# SIM | simplicity (code complexity)
#  TD | todos (comments)
# TRY | tryceratops (exceptions)
#  UP | pyupgrade (old syntax)
#   W | pycodestyle warnings (PEP8)

ignore = ['ANN101', 'D100', 'D104', 'D105', 'D107', 'D203', 'D212', 'D402', 'E501', 'TD002']
# ANN101 | for avoding missing 'Self' type hint (not available in Python 3.9)
#   D100 | for avoding module level docstrings
#   D104 | for avoding package level docstrings
#   D105 | for avoding missing docstrings in magic methods (which are often self-explanatory)
#   D203 | for requring blank line before classes (which looks silly)
#   D212 | for docstring requring multi-line comments to start on first line (which looks silly)
#   D402 | for docstring that can't resemble their signatures (despite them being completely different)
#   E501 | for bug-bear compatibility (as B905 overrides line length checks)
#  TD002 | for allowing TODOs without an author (as an issue should assign ownership)

[tool.ruff.lint.per-file-ignores]
"tests/*"    = ["ANN201", "ANN401", "D101", "D102", "D103", "S101"]
"config.py"  = ["N802"]
"classes.py" = ["D102"]
#    tests/* | ANN201 | ignore public functions
#    tests/* | ANN401 | ignore use of 'Any' type
#    tests/* |   D101 | ignore missing docstrings for public classes
#    tests/* |   D102 | ignore missing docstrings for public methods
#    tests/* |   D103 | ignore missing docstrings for public functions
#    tests/* |   S101 | ignore use of assert
#  config.py |   N802 | ignore use of upper case method names
# classes.py |   D102 | ignore missing docstrings for class methods (temporary)

[tool.pytest.ini_options]
addopts = "--strict-markers --random-order -x --ff"
# --strict-markers | fail if unknown markers are used
# --random-order   | run tests in random order
# -x               | stop after first failure [Overriden in CI]
# --ff             | run failed tests first
markers = [
  "cov: coverage checks (deselect with '-m \"not cov\"')"
]
filterwarnings = [
    "ignore::DeprecationWarning:.*hazmat.*",
    "ignore::DeprecationWarning:.*awscli.*"
]

[tool.pytest_env]
APP_ENABLE_SENTRY="False"
APP_LOGGING_LEVEL="INFO"
CSW_ENDPOINT_UNPUBLISHED="https://example.com/csw/unpublished"
CSW_ENDPOINT_PUBLISHED="https://example.com/csw/published"
CSW_SERVER_CONFIG_UNPUBLISHED_ENDPOINT="https://example.com/csw/unpublished"
CSW_SERVER_CONFIG_PUBLISHED_ENDPOINT="https://example.com/csw/published"
CSW_SERVER_CONFIG_UNPUBLISHED_DATABASE_CONNECTION="postgresql://postgres:password@example/postgres"
CSW_SERVER_CONFIG_PUBLISHED_DATABASE_CONNECTION="postgresql://postgres:password@example/postgres"
S3_BUCKET="example"

[tool.coverage.report]
skip_empty = true
show_missing = false
fail_under = 95

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.run]
branch = true
source = ["src"]
omit = ["*/hazmat/*"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
