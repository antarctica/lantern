[tool.poetry]
name = "scar-add-metadata-toolbox"
version = "0.4.3"
license = "MIT"
description = "Editor, repository and data catalogue for SCAR Antarctic Digital Database (ADD) discovery metadata"
authors = [
    "Felix Fennell <felnne@bas.ac.uk>"
]
readme = "README.md"
homepage = "https://github.com/antarctica/scar-add-metadata-toolbox"
repository = "https://github.com/antarctica/scar-add-metadata-toolbox"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research"
]

[tool.poetry.dependencies]
awscli = "1.22.37" # pinned to specific version to aid in dependency resolution time
bas-metadata-library = "^0.9.0"
bas-style-kit-jinja-templates = "^0.7.0"
click-spinner = "^0.1.10"
Flask = "^2.0.2"
flask-azure-oauth = "^0.6.0"
Markdown = "3.2.2" # pinned to specific version due to importlib-metadata compatibility with flake8
msal = "^1.18.0"
python = "^3.6.2"
python-dateutil = "^2.8.1"
python-dotenv = "^0.19.2"
requests = "^2.24.0"
sentry-sdk = {version = "^1.9.0", extras = ["flask"]}
str2bool = "^1.1"
tabulate = "^0.8.7"

# # Python 3.6 backports
importlib_metadata = "^4.2.0"
importlib_resources = "^5.4.0"
backports-datetime-fromisoformat = "^1.0.0"

# # dependencies for vendored OWSlib package
# python-dateutil = "^1.5"  # already a dependency of main app
pytz = "^2021.3"
# requests = "^1.0"  # already a dependency of main app
pyproj = "2.6.1"  # pinned to specific version due to PROJ version in 3.6 alpine container
pyyaml = "5.4.1"  # pinned to specific version due to AWS CLI compatibility, requires PyYAML < 5.5

# # dependencies for vendored PyCSW package
geolinks = "^0.2.0"
# lxml = "^4.7"  # already a dependency of main app
# pyproj = "^2.6.0"  # already a dependency of OWSLib vendored dependency
Shapely = "^1.8.0"
xmltodict = "^0.12.0"
psycopg2-binary = "^2.8.5"
SQLAlchemy = "^1.4.31"

[tool.poetry.dev-dependencies]
flake8 = "^4.0.1"
flake8-bandit = "^2.1.2"
flake8-black = "^0.2.3"
flake8-bugbear = "^22.1.11"
flake8-builtins = "^1.5.3"
flake8-import-order = "^0.18.1"
flake8-use-fstring = "^1.3"
pytest = "^6.2.5"
pytest-cov = "^3.0.0"
pytest-flask = "^1.2.0"
pytest-random-order = "^1.0.4"
safety = "^1.10.3"
tomlkit = "^0.8.0"

[tool.black]
line-length = 120
target-version = ['py36']
include = '\.pyi?$'
exclude = ''

[build-system]
requires = ["poetry>=1.0.0"]
build-backend = "poetry.masonry.api"
