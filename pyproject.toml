[tool.poetry]
name = "scar-add-metadata-toolbox"
version = "0.5.0"
license = "MIT"
description = "Editor, repository and data catalogue for SCAR Antarctic Digital Database (ADD) discovery metadata"
authors = [
    "Felix Fennell <felnne@bas.ac.uk>"
]
readme = "README.md"
homepage = "https://github.com/antarctica/scar-add-metadata-toolbox"
repository = "https://github.com/antarctica/scar-add-metadata-toolbox"
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: Other/Proprietary License",
    "Operating System :: OS Independent",
    "Intended Audience :: Science/Research"
]

[tool.poetry.dependencies]
awscli = "1.24.10" # pinned because <= 1.25 requires Python > 3.6, also to aid in dependency resolution time
bas-metadata-library = "^0.9.1"
bas-style-kit-jinja-templates = "^0.7.0"
click-spinner = "^0.1.10"
Flask = "^2.0.2"
flask-azure-oauth = "^0.7.0"
Markdown = "3.2.2" # pinned due to importlib-metadata compatibility with flake8
msal = "^1.19.0"
python = "^3.8.1"
python-dateutil = "^2.8.1"
python-dotenv = "^0.20.0" # pinned because <= 0.21 requires Python > 3.6
requests = "^2.27.1"  # pinned because <= 2.28 requires Python > 3.6
sentry-sdk = {version = "^1.9.9", extras = ["flask"]}
str2bool = "^1.1"
tabulate = "^0.8.10"

# # Python 3.6 backports
importlib_metadata = "^4.2.0"
importlib_resources = "^5.4.0"
backports-datetime-fromisoformat = "^1.0.0"

# # dependencies for vendored OWSlib package
# python-dateutil = "^1.5"  # already a dependency of main app
pytz = "^2022.2.1"
# requests = "^1.0"  # already a dependency of main app
pyproj = "2.6.1"  # pinned to highest PROJ version available in Python 3.6 alpine container
pyyaml = "5.4.1"  # pinned because AWS CLI compatibility, requires PyYAML < 5.5 - REVIEW

# # dependencies for vendored PyCSW package
geolinks = "^0.2.0"
# lxml = "^4.7"  # already a dependency of main app
# pyproj = "^2.6.0"  # already a dependency of OWSLib vendored dependency
Shapely = "^1.8.4"
xmltodict = "^0.13.0"
psycopg2-binary = "^2.9.3"
SQLAlchemy = "^1.4.41"

[tool.poetry.dev-dependencies]
flake8 = "^4.0.1"  # pinned because >= 5.0 requires Flake8-bandit 4.1.0, which requires Python > 3.6
flake8-bandit = "2.1.2"  # pinned because >= 3.0 requires Bandit > 1.7.3, which requires Python > 3.6
flake8-black = "0.3.1"  # pinned because >= 0.3.2 requires Python > 3.6
flake8-bugbear = "^22.9.23"
flake8-builtins = "^1.5.3"
flake8-import-order = "^0.18.1"
flake8-use-fstring = "^1.4"
pytest = "^7.0.1"  # pinned because >= 7.3 requires Python > 3.6
pytest-cov = "^4.0.0"
pytest-flask = "^1.2.0"
pytest-random-order = "^1.0.4"
safety = "^2.2.0"
tomlkit = "^0.11.5"

[tool.black]
line-length = 120
target-version = ['py36']
include = '\.pyi?$'
exclude = ''

[build-system]
requires = ["poetry>=1.0.0"]
build-backend = "poetry.masonry.api"
