interactions:
- request:
    body: null
    headers:
      Accept:
      - '*/*'
      Accept-Encoding:
      - gzip, deflate
      Connection:
      - keep-alive
      User-Agent:
      - python-requests/2.33.0
    method: HEAD
    uri: https://example.com/index.html
  response:
    body:
      string: ''
    headers:
      Content-Length:
      - '15'
      Content-Type:
      - text/html
    status:
      code: 500
      message: Internal Server Error
version: 1
